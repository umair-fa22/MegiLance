name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  # Backend Tests
  backend-tests:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest

    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_TEST_DB_URL || 'libsql://test.turso.io' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_TEST_TOKEN || 'test-token' }}
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY || 'test-secret-key-for-ci-only-32-chars' }}
      ENVIRONMENT: testing

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio bandit safety

    - name: Run security checks
      run: |
        cd backend
        echo "=== Checking for known vulnerabilities ==="
        safety check --json || true

        echo "=== Running Bandit security scan ==="
        bandit -r app/ -ll || true

    - name: Run linting
      run: |
        cd backend
        pip install flake8 black isort
        echo "=== Black formatting check ==="
        black --check app/ --diff || true
        echo "=== Import sorting ==="
        isort --check-only app/ || true

    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing || true

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.xml
        flags: backend
        fail_ci_if_error: false

  # Frontend Tests
  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Run linting
      run: |
        cd frontend
        npm run lint || true

    - name: Run tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false || true

    - name: Build
      env:
        NEXT_PUBLIC_API_URL: https://api.megilance.site/api
        NEXT_PUBLIC_BACKEND_URL: https://api.megilance.site
      run: |
        cd frontend
        npm run build

    - name: Check bundle size
      run: |
        cd frontend
        du -sh .next/
        echo "If > 500MB, consider optimizing"

  # Database Migrations Check
  migrations-check:
    name: Database Migrations
    runs-on: ubuntu-latest

    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_TEST_DB_URL || 'libsql://test.turso.io' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_TEST_TOKEN || 'test-token' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Check migration status
      run: |
        cd backend
        alembic history | head -10

  # Docker Build (optional - commented out for faster CI)
  # docker-build:
  #   name: Docker Build
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'push'
  #   
  #   steps:
  #   - uses: actions/checkout@v3
  #   
  #   - name: Set up Docker Buildx
  #     uses: docker/setup-buildx-action@v2
  #   
  #   - name: Build backend
  #     uses: docker/build-push-action@v4
  #     with:
  #       context: ./backend
  #       push: false
  #       cache-from: type=gha
  #       cache-to: type=gha,mode=max
  #   
  #   - name: Build frontend
  #     uses: docker/build-push-action@v4
  #     with:
  #       context: ./frontend
  #       push: false
  #       cache-from: type=gha
  #       cache-to: type=gha,mode=max

  # Code Quality Analysis
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install analysis tools
      run: |
        pip install pylint radon

    - name: Pylint Analysis
      run: |
        cd backend
        pylint app/ --exit-zero --output-format=colorized

    - name: Code Complexity
      run: |
        cd backend
        radon cc app/ -a -nb

  # Dependency Check
  dependency-check:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Check Python dependencies
      run: |
        pip install safety
        cd backend
        safety check --json || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Check Node dependencies
      run: |
        cd frontend
        npm audit || true

