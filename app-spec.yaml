domains:
- domain: megilance.site
  type: PRIMARY
  zone: megilance.site
- domain: www.megilance.site
  type: ALIAS
  zone: megilance.site
- domain: api.megilance.site
  type: ALIAS
  zone: megilance.site
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: backend
      preserve_path_prefix: true
    match:
      path:
        prefix: /api
  - component:
      name: ai-service
      preserve_path_prefix: true
    match:
      path:
        prefix: /ai-api
  - component:
      name: frontend
    match:
      path:
        prefix: /
name: megilance
region: blr
services:
- dockerfile_path: backend/Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  name: backend
- dockerfile_path: ai/Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 8001
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb-fixed
  name: ai-service
- build_command: npm install --legacy-peer-deps autoprefixer@10.4.21 && npm install
    --legacy-peer-deps --no-save lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.4
    && npm run build
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  - key: NPM_CONFIG_PRODUCTION
    scope: RUN_AND_BUILD_TIME
    value: "false"
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 3000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb-fixed
  name: frontend
  source_dir: frontend
