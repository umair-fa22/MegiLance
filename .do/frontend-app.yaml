name: megilance-frontend
services:
- name: web
  source_dir: frontend
    build_command: npm install --legacy-peer-deps autoprefixer@10.4.21 && npm install --legacy-peer-deps --no-save lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.4 && npm run build
  github:
    repo: ghulam-mujtaba5/MegiLance
    branch: main
    deploy_on_push: true
  health_check:
    http_path: /
    initial_delay_seconds: 90
    period_seconds: 30
    timeout_seconds: 10
    success_threshold: 1
    failure_threshold: 5
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: NEXT_PUBLIC_BACKEND_URL
    value: "https://megilance-backend-qhnxp.ondigitalocean.app"
    scope: RUN_AND_BUILD_TIME
  - key: NODE_ENV
    value: "production"
    scope: RUN_AND_BUILD_TIME
  - key: NPM_CONFIG_PRODUCTION
    value: "false"
    scope: RUN_AND_BUILD_TIME
