apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: megilance-ingress
  namespace: megilance
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - app.megilance.com
    - api.megilance.com
    secretName: megilance-tls
  rules:
  - host: app.megilance.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: api.megilance.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
