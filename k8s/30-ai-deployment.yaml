apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: megilance
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: megilance-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7860
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
