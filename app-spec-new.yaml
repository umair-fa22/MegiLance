name: megilance
region: blr
services:
- dockerfile_path: backend/Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-s
  name: backend
- dockerfile_path: ai/Dockerfile
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 8001
  instance_count: 1
  instance_size_slug: basic-s
  name: ai-service
- dockerfile_path: frontend/Dockerfile
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  github:
    branch: main
    deploy_on_push: true
    repo: umair-fa22/MegiLance
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-s
  name: frontend
ingress:
  rules:
  - component:
      name: backend
      preserve_path_prefix: true
    match:
      path:
        prefix: /api
  - component:
      name: ai-service
      preserve_path_prefix: true
    match:
      path:
        prefix: /ai-api
  - component:
      name: frontend
    match:
      path:
        prefix: /
domains:
- domain: megilance.site
  type: PRIMARY
  zone: megilance.site
- domain: www.megilance.site
  type: ALIAS
  zone: megilance.site
- domain: api.megilance.site
  type: ALIAS
  zone: megilance.site
