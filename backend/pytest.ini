# @AI-HINT: Pytest configuration file
# Configures test discovery and async support

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    integration: Integration tests
    slow: Slow running tests
asyncio_mode = auto

[pytest:env]
TESTING = 1
